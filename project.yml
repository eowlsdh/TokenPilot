name: TokenPilot
options:
  bundleIdPrefix: com.tokenpilot
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  TokenCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/TokenCore
        type: group
        excludes:
          - AGENTS.md
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokenpilot.TokenCore
        PRODUCT_NAME: TokenCore
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        INSTALL_PATH: "@executable_path/../Frameworks"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
          - "@loader_path/Frameworks"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/TokenCore-Info.plist

  TokenPilot:
    type: application
    platform: macOS
    sources:
      - path: Sources/TokenApp
        type: group
        excludes:
          - AGENTS.md
      - path: Resources/Assets.xcassets
      - path: Resources/PrivacyInfo.xcprivacy
      - path: Resources/TokenPilot.icns
    dependencies:
      - target: TokenCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokenpilot.macos
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/TokenPilot.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: TokenPilot
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 TokenPilot. All rights reserved."
        INFOPLIST_KEY_NSSupportsAutomaticTermination: YES
        INFOPLIST_KEY_NSSupportsSuddenTermination: YES
